<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 11</title>
    <style>
        .container {
            position: relative;
            width: 300px;
        }
        .img-fundo {
            width: 100%;
        }
        .img-topo {
            position: absolute;
            width: 150px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }


    </style>
</head>
<body>
    <div class="container">
        <img src="imagem/espaco.jpg" class="img-fundo">
        <img src="imagem/astronauta.png"class="img-topo">
    </div>
</body>
</html>
